<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <script src="calculator.js" defer></script>
    </head>
    <body>
        <h1>Calculator</h1>
        <div id="calculator">
            <div id="screen">
                <div id = "display"></div>
                <div id = "result">0</div>
            </div>
            <div id = "buttons">
                <div class = "row">
                    <button id="clear" onclick="reset()">CLEAR</button>
                    <button id="delete" onclick="del()">DELETE</button>
                </div>
                <div class = "row">
                    <button onclick="getDigit('7')">7</button>
                    <button onclick="getDigit('8')">8</button>
                    <button onclick="getDigit('9')">9</button>
                    <button onclick="getOperator('÷')">÷</button>
                </div>
                <div class = "row">
                    <button onclick="getDigit('4')">4</button>
                    <button onclick="getDigit('5')">5</button>
                    <button onclick="getDigit('6')">6</button>
                    <button onclick="getOperator('×')">×</button>
                </div>
                <div class = "row">
                    <button onclick="getDigit('1')">1</button>
                    <button onclick="getDigit('2')">2</button>
                    <button onclick="getDigit('3')">3</button>
                    <button onclick="getOperator('−')">−</button>
                </div>
                <div class="row">
                    <button id="comma" onclick="getDigit('.')">.</button>
                    <button onclick="getDigit('0')">0</button>
                    <button id="equals" onclick="operate()">=</button>
                    <button onclick="getOperator('+')">+</button>
                </div>
            </div>
        </div>
    <footer>made with <span style="color:#86b1cb">&#x2764</span> by Camomille</footer>
    </body>
</html>
